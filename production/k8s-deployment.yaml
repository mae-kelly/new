apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-scanner
  labels:
    app: ml-scanner
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ml-scanner
  template:
    metadata:
      labels:
        app: ml-scanner
    spec:
      containers:
      - name: ml-scanner
        image: ml-scanner:latest
        ports:
        - containerPort: 8000
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: BIGQUERY_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: bigquery-secret
              key: project-id
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/app/credentials.json"
        volumeMounts:
        - name: credentials
          mountPath: /app/credentials.json
          subPath: credentials.json
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: credentials
        secret:
          secretName: bigquery-secret
---
apiVersion: v1
kind: Service
metadata:
  name: ml-scanner-service
spec:
  selector:
    app: ml-scanner
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: v1
kind: Secret
metadata:
  name: bigquery-secret
type: Opaque
data:
  project-id: BASE64_ENCODED_PROJECT_ID
  credentials.json: BASE64_ENCODED_CREDENTIALS
